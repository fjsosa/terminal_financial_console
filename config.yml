# Neon Quotes configuration
# Precedence: config.yml < environment variables < CLI arguments

# IANA timezone, e.g. America/Argentina/Buenos_Aires
timezone: "America/Argentina/Buenos_Aires"

# Crypto symbols in Binance format
crypto_symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - ADAUSDT
  - BNBUSDT
  - PAXGUSDT

# Stock symbols (Yahoo Finance tickers)
stock_symbols:
  - AAPL
  - MSFT
  - NVDA
  - AMZN
  - GOOGL
